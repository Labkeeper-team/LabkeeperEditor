version: '3.8'
name: 'labkeeper-local-frontend'

services:
  nginx:
    image: nginx:alpine
    container_name: labkeeper-backend-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
